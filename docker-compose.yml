version: '3.8'
services:
  db:
    image: postgres:16
    container_name: polars_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: etl_db
    ports:
      - "5432:5432"
    volumes:
      - ./src/generate_data.sql:/docker-entrypoint-initdb.d/init.sql

  etl_app:
    image: python:3.11-slim
    container_name: polars_python
    depends_on:
      - db
    volumes:
      - .:/app
    working_dir: /app
    command: >
      bash -c "pip install -r requirements.txt && sleep 5 && python src/polars_etl.py"